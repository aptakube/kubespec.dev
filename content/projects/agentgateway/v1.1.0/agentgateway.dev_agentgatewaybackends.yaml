                                                                    clientId:
                                                                      type: string
                                                                    objectId:
                                                                      type: string
                                                                    resourceId:
                                                                      type: string
                                                                  required:
                                                                  - clientId
                                                                  - objectId
                                                                  - resourceId
                                                                  type: object
                                                                secretRef:
                                                                  description: |-
                                                                    `secretRef` references a Kubernetes `Secret` containing the Azure
                                                                    credentials. The `Secret` must have keys `clientID`, `tenantID`, and
                                                                    `clientSecret`.
                                                                  properties:
                                                                    name:
                                                                      default: ""
                                                                      description: |-
                                                                        Name of the referent.
                                                                        This field is effectively required, but due to backwards compatibility is
                                                                        allowed to be empty. Instances of this type with an empty value here are
                                                                        almost certainly wrong.
                                                                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                                                      type: string
                                                                  type: object
                                                                  x-kubernetes-map-type: atomic
                                                              type: object
                                                            gcp:
                                                              description: |-
                                                                Auth specifies to use a Google  authentication method for the backend.
                                                                When omitted, we will try to use the default AWS SDK authentication methods.
                                                              properties:
                                                                audience:
                                                                  description: |-
                                                                    `audience` allows explicitly configuring the `aud` of the ID token. Only
                                                                    valid with `IdToken` type. If not set, the `aud` is automatically
                                                                    derived from the backend hostname.
                                                                  maxLength: 256
                                                                  minLength: 1
                                                                  type: string
                                                                type:
                                                                  description: |-
                                                                    The type of token to generate. To authenticate to GCP services,
                                                                    generally an `AccessToken` is used. To authenticate to Cloud Run, an
                                                                    `IdToken` is used.
                                                                  enum:
                                                                  - AccessToken
                                                                  - IdToken
                                                                  type: string
