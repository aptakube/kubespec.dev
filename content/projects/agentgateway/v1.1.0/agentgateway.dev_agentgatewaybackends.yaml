                                        items:
                                          description: "FieldDefault provides default
                                            values for specific fields in the JSON
                                            request body sent to the LLM provider.\nThese
                                            defaults are merged with the user-provided
                                            request to ensure missing fields are populated.\n\nUser
                                            input fields here refer to the fields
                                            in the JSON request body that a client
                                            sends when making a request to the LLM
                                            provider.\nDefaults set here do _not_
                                            override those user-provided values unless
