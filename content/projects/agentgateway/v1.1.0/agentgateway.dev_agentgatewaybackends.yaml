                                    properties:
                                      defaults:
                                        description: Provide defaults to merge with
                                          user input fields. If the field is already
                                          set, the field in the request is used.
                                        items:
                                          description: "FieldDefault provides default
                                            values for specific fields in the JSON
                                            request body sent to the LLM provider.\nThese
                                            defaults are merged with the user-provided
                                            request to ensure missing fields are populated.\n\nUser
                                            input fields here refer to the fields
                                            in the JSON request body that a client
                                            sends when making a request to the LLM
                                            provider.\nDefaults set here do _not_
                                            override those user-provided values unless
                                            you explicitly set `override` to `true`.\n\nExample:
                                            Setting a default system field for Anthropic,
                                            which does not support system role messages:\n\n\tdefaults:\n\t
                                            \ - field: \"system\"\n\t    value: \"answer
                                            all questions in French\"\n\nExample:
                                            Setting a default temperature and overriding
                                            `max_tokens`:\n\n\tdefaults:\n\t  - field:
                                            \"temperature\"\n\t    value: \"0.5\"\n\t
                                            \ - field: \"max_tokens\"\n\t    value:
                                            \"100\"\n\t    override: true\n\nExample:
                                            Setting custom lists fields:\n\n\tdefaults:\n\t
                                            \ - field: \"custom_integer_list\"\n\t
                                            \   value: [1,2,3]\n\n\toverrides:\n\t
                                            \ - field: \"custom_string_list\"\n\t
                                            \   value: [\"one\",\"two\",\"three\"]\n\nNote:
                                            The `field` values correspond to keys
                                            in the JSON request body, not fields in
                                            this CRD."
                                          properties:
                                            field:
                                              allOf:
                                              - minLength: 1
