                                                                      minLength: 1
                                                                      pattern: ^[A-Za-z0-9!#$%&'*+\-.^_\x60|~]+$
                                                                      type: string
                                                                    prefix:
                                                                      maxLength: 256
                                                                      minLength: 1
                                                                      type: string
                                                                  required:
                                                                  - name
